plugins {
	id 'java'
	id 'org.springframework.boot' version '4.0.2'
	id 'io.spring.dependency-management' version '1.1.7'
}

group = 'com.example'
version = '0.0.1-SNAPSHOT'
description = 'Demo project for Spring Boot'

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(25)
	}
}

configurations {
	compileOnly {
		extendsFrom annotationProcessor
	}
}

repositories {
	mavenCentral()
}

dependencies {
	implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
	implementation 'org.springframework.boot:spring-boot-starter-web'
	implementation 'org.springframework.boot:spring-boot-starter-actuator'
	implementation 'com.github.ulisesbocchio:jasypt-spring-boot-starter:3.0.5'
	implementation 'com.querydsl:querydsl-jpa:5.1.0:jakarta'

	// OpenTelemetry & Observability - Spring Boot 4.0 권장 방식
	implementation 'io.micrometer:micrometer-tracing-bridge-otel'
	implementation 'io.opentelemetry:opentelemetry-exporter-otlp'

	implementation 'org.springframework:spring-aspects'
	implementation 'io.micrometer:micrometer-observation'

	// Spring Boot 4.0 자동 설정 지원
	implementation platform('io.opentelemetry:opentelemetry-bom:1.47.0')
	implementation 'io.opentelemetry:opentelemetry-api'
	implementation 'io.opentelemetry:opentelemetry-sdk'
	implementation 'io.opentelemetry:opentelemetry-sdk-extension-autoconfigure'
	implementation 'io.opentelemetry.instrumentation:opentelemetry-instrumentation-annotations:2.10.0'
	
	compileOnly 'org.projectlombok:lombok'
	
	// SQLite JDBC Driver
	runtimeOnly 'org.xerial:sqlite-jdbc:3.47.1.0'
	// Hibernate SQLite Dialect
	runtimeOnly 'org.hibernate.orm:hibernate-community-dialects:6.6.1.Final'
	
	// MySQL Connector
	runtimeOnly 'com.mysql:mysql-connector-j'
	
	// PostgreSQL Connector
	runtimeOnly 'org.postgresql:postgresql'
	
	annotationProcessor 'org.projectlombok:lombok'
	annotationProcessor 'com.querydsl:querydsl-apt:5.1.0:jakarta'
	annotationProcessor 'jakarta.persistence:jakarta.persistence-api'
	annotationProcessor 'jakarta.annotation:jakarta.annotation-api'

	testImplementation 'org.springframework.boot:spring-boot-starter-test'
	testImplementation 'org.springframework.boot:spring-boot-starter-webmvc-test'
	testCompileOnly 'org.projectlombok:lombok'
	testAnnotationProcessor 'org.projectlombok:lombok'
}

tasks.withType(JavaCompile).configureEach {
	options.compilerArgs << '--enable-preview'
}

tasks.named('test') {
	useJUnitPlatform()
	// 시스템 프로퍼티 전달 (예: -Dspring.profiles.active=mysql)
	systemProperty 'spring.profiles.active', System.getProperty('spring.profiles.active')
	// Virtual Thread 핀닝 감지: 핀닝 발생 시 carrier thread + 스택 트레이스 출력
	jvmArgs '-Djdk.tracePinnedThreads=full'
	jvmArgs '--enable-preview'
}
