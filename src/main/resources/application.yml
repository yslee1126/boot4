spring:
  application:
    name: boot4
  datasource:
    # pool=4 : Java 25 의 피닝 개선 효과를 확인하기 위해 코어 수(4)에 맞춤
    url: jdbc:sqlite:./build/boot4.db?journal_mode=WAL&busy_timeout=10000
    driver-class-name: org.sqlite.JDBC
    username:
    password:
    hikari:
      maximum-pool-size: 4
      minimum-idle: 4
      # 50개 요청이 4개 풀을 통해 순차 처리될 수 있도록 충분한 대기 시간 부여
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
        format_sql: true
  threads: 
    virtual: 
      enabled: true

management:
  # ============================================================================
  # OpenTelemetry 활성화하려면 아래 주석 해제
  # ============================================================================
  # tracing:
  #   enabled: true  # OpenTelemetry 활성화 (OtelConfig 로드됨)
  # ============================================================================
  observation:
    annotations:
      enabled: true  # @Observed 어노테이션 활성화
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces  # OtelConfig에서 사용 (tracing.enabled=true일 때만)
  endpoints:
    web:
      exposure:
        include: "*"  # Actuator 엔드포인트 노출 (선택사항)

jasypt:
  encryptor:
    password: ${JASYPT_KEY}
    algorithm: PBEWITHHMACSHA512ANDAES_256
    iv-generator-classname: org.jasypt.iv.RandomIvGenerator

logging:
  pattern:
    console: "%d{HH:mm:ss.SSS} [%t] %-5level %logger{36} - %msg%n"
  level:
    com.example.boot4: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
